name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck + template validation
        run: |
          set -euo pipefail
          shellcheck -s bash setup.sh tools/preview.sh
          awk '/cat > "\$RENDERER" <<.RENDER_EOF.$/{f=1;next} f&&/^RENDER_EOF$/{f=0} f' setup.sh > /tmp/render.bash
          awk '/cat > "\$UPDATER" <<.UPD_EOF.$/{f=1;next} f&&/^UPD_EOF$/{f=0} f' setup.sh > /tmp/updater.sh
          awk '/cat > "\$PROFILE_SNIPPET" <<.EOF.$/{f=1;next} f&&/^EOF$/{f=0} f' setup.sh > /tmp/snip.sh
          test -s /tmp/render.bash && test -s /tmp/updater.sh   # extraction actually found them
          shellcheck -s bash /tmp/render.bash
          sh -n /tmp/updater.sh
          sh -n /tmp/snip.sh
          python3 -c "import ast; ast.parse(open('tools/render-svg.py').read())"
          # Every template must use only known tokens (preview exits non-zero on unknowns).
          for f in message.txt examples/*.txt; do
            bash tools/preview.sh "$f" >/dev/null || { echo "unknown token in $f"; exit 1; }
          done
          # Screenshots must be regenerable and match what's committed.
          python3 tools/render-svg.py examples/server.txt    /tmp/server.svg
          python3 tools/render-svg.py examples/branded.txt   /tmp/branded.svg
          python3 tools/render-svg.py examples/ascii-art.txt /tmp/ascii-art.svg
          diff -q /tmp/server.svg docs/img/server.svg
          diff -q /tmp/branded.svg docs/img/branded.svg
          diff -q /tmp/ascii-art.svg docs/img/ascii-art.svg
          echo "lint OK"

  integration-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up fakes (NetBird iface, listener, template server)
        run: |
          set -euo pipefail
          sudo ip link add wt0 type dummy
          sudo ip addr add 100.64.0.5/10 dev wt0
          sudo ip link set wt0 up
          python3 -m http.server 8099 --bind 0.0.0.0 --directory "$PWD" &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 20); do curl -fsS http://127.0.0.1:8099/message.txt >/dev/null 2>&1 && break; sleep 0.5; done

      - name: Install from the working tree
        run: sudo bash setup.sh --url "http://127.0.0.1:8099/message.txt"

      - name: Assert install artifacts (renamed 00-welcome)
        run: |
          set -euo pipefail
          test -x /usr/local/sbin/terminal-welcome-render
          test -x /usr/local/sbin/terminal-welcome-update
          test -x /etc/update-motd.d/00-welcome
          test ! -e /etc/update-motd.d/00-carlboms-welcome
          systemctl is-enabled terminal-welcome.timer
          test -s /etc/terminal-welcome/disabled-motd.d
          if [ -e /etc/update-motd.d/10-help-text ]; then test ! -x /etc/update-motd.d/10-help-text; fi

      - name: Assert rendered content (default template)
        run: |
          set -euo pipefail
          out=$(sudo /usr/local/sbin/terminal-welcome-render); echo "$out"
          grep -q 'Copyright Carlboms Data AB' <<<"$out"
          grep -q 'Host    :'                  <<<"$out"
          grep -Eq 'VPN IP  : 100\.64\.0\.5'   <<<"$out"
          grep -q '8099'                       <<<"$out"

      - name: Assert generic tokens + colour + emoji + reboot
        run: |
          set -euo pipefail
          sudo systemctl stop terminal-welcome.timer 2>/dev/null || true
          sudo touch /var/run/reboot-required
          sudo tee /etc/terminal-welcome/message >/dev/null <<'TPL'
          {{CYAN}}hi{{RESET}} 🚀
           IPWT0 : {{IP_WT0}}
           URL8  : {{URL_WT0_PORT_8080}}
           URL443: {{URL_WT0_PORT_443}}
           {{REBOOT}}
          TPL
          out=$(sudo /usr/local/sbin/terminal-welcome-render)
          echo "$out" | sed 's/\x1b/<ESC>/g'
          esc=$(printf '\033'); case "$out" in *"$esc"*) : ;; *) echo "no colour"; exit 1 ;; esac
          printf '%s' "$out" | grep -q '🚀'
          grep -q '100.64.0.5'               <<<"$out"     # {{IP_WT0}}
          grep -q 'http://100.64.0.5:8080'   <<<"$out"     # {{URL_WT0_PORT_8080}}
          grep -q 'https://100.64.0.5'       <<<"$out"     # {{URL_WT0_PORT_443}} -> https, no port
          grep -q 'System restart required'  <<<"$out"

      - name: Re-run install is idempotent (ledger must survive)
        run: |
          set -euo pipefail
          before=$(cat /etc/terminal-welcome/disabled-motd.d)
          sudo bash setup.sh --url "http://127.0.0.1:8099/message.txt"
          after=$(cat /etc/terminal-welcome/disabled-motd.d)
          test "$before" = "$after"                        # ledger not corrupted on re-run
          if [ -e /etc/update-motd.d/10-help-text ]; then test ! -x /etc/update-motd.d/10-help-text; fi

      - name: Uninstall restores the box
        run: |
          set -euo pipefail
          sudo bash setup.sh --uninstall
          test ! -e /usr/local/sbin/terminal-welcome-render
          test ! -e /etc/update-motd.d/00-welcome
          test ! -e /etc/terminal-welcome
          test ! -e /var/lib/terminal-welcome
          if [ -e /etc/update-motd.d/10-help-text ]; then test -x /etc/update-motd.d/10-help-text; fi

      - name: Stop template server
        if: always()
        run: kill "${SERVER_PID:-0}" 2>/dev/null || true

  cross-distro:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [debian:stable, fedora:latest, archlinux:latest]
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          set -eu
          if command -v apt-get >/dev/null; then
            apt-get update -qq && apt-get install -y curl iproute2 procps gawk hostname sed grep coreutils >/dev/null
          elif command -v dnf >/dev/null; then
            dnf install -y curl iproute procps-ng gawk hostname sed grep coreutils >/dev/null
          elif command -v pacman >/dev/null; then
            pacman -Sy --noconfirm --needed curl iproute2 procps-ng gawk inetutils sed grep coreutils >/dev/null
          fi
      - name: Install from the working tree (root, no systemd -> cron/none path)
        run: bash setup.sh --url "file://$PWD/message.txt"
      - name: Assert the banner renders
        run: |
          set -eu
          out=$(/usr/local/sbin/terminal-welcome-render); echo "$out"
          grep -q 'Copyright Carlboms Data AB' <<<"$out"
          grep -q 'Host    :'                  <<<"$out"
      - name: Assert colour + emoji rendering
        run: |
          set -eu
          cat > /etc/terminal-welcome/message <<'TPL'
          {{GREEN}}ok{{RESET}} ✅ {{HOSTNAME}}
          TPL
          out=$(/usr/local/sbin/terminal-welcome-render)
          esc=$(printf '\033'); case "$out" in *"$esc"*) : ;; *) echo "no colour"; exit 1 ;; esac
          printf '%s' "$out" | grep -q '✅'
          if printf '%s' "$out" | grep -q '{{'; then echo "leftover tokens"; exit 1; fi
      - name: Uninstall
        run: |
          set -eu
          bash setup.sh --uninstall
          test ! -e /etc/terminal-welcome
